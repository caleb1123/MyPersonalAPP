name: Deploy Docker

on:
  push:
    branches: ["main"]   # ❗ chỉ chạy khi bạn push

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build & Run Docker
        run: |
          docker-compose down
          docker-compose up -d --build

      - name: Check containers
        run: docker ps
